<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AtmosferinKalbi | V1.0</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(180deg, #3b82f6 0%, #1e40af 45%, #020617 100%);
            background-attachment: fixed;
            min-height: 100vh; color: white; margin: 0;
        }

        .text-outline { text-shadow: 2px 4px 0px rgba(0, 0, 0, 0.35); }
        .data-font { font-weight: 900; letter-spacing: -0.05em; font-style: normal !important; line-height: 0.9; }

        .sidebar {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(30px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 100%; height: 70px; bottom: 0; top: auto;
                flex-direction: row; border-right: none; border-top: 1px solid rgba(255,255,255,0.1);
                padding: 0 10px; justify-content: space-around;
            }
            .main-content { margin-left: 0 !important; margin-bottom: 80px; }
            .sidebar-text, .version-tag { display: none; }
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 2.5rem; 
        }

        .data-block { border-right: 1px solid rgba(255, 255, 255, 0.1); padding-right: 25px; }
        .data-block:last-child { border-right: none; }
        
        .logo-gradient {
            background: linear-gradient(to right, #ffffff, #93c5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col lg:flex-row">

    <aside class="sidebar fixed left-0 top-0 h-full w-64 z-50 flex flex-col p-6 gap-8">
        <div class="sidebar-logo flex items-center gap-3 mb-6">
            <div class="bg-white text-blue-600 p-2.5 rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.3)]">
                <i data-lucide="heart-pulse" class="w-6 h-6 animate-pulse"></i>
            </div>
            <div class="flex flex-col">
                <span class="font-black text-xl italic tracking-tighter logo-gradient">Atmosferin<span class="text-blue-400">Kalbi</span></span>
                <span class="version-tag text-[10px] font-black opacity-40 tracking-[0.3em]">VERSION 1.0</span>
            </div>
        </div>

        <nav class="flex lg:flex-col gap-3 w-full">
            <button onclick="getWeather('Istanbul')" class="flex items-center gap-4 p-4 hover:bg-white/10 rounded-2xl w-full transition group">
                <i data-lucide="map-pin" class="text-blue-300"></i>
                <span class="sidebar-text font-bold text-xs uppercase tracking-widest">İstanbul</span>
            </button>
            <button onclick="getWeather('Ankara')" class="flex items-center gap-4 p-4 hover:bg-white/10 rounded-2xl w-full transition">
                <i data-lucide="map-pin" class="text-blue-300"></i>
                <span class="sidebar-text font-bold text-xs uppercase tracking-widest">Ankara</span>
            </button>
            <button onclick="getWeather('Izmir')" class="flex items-center gap-4 p-4 hover:bg-white/10 rounded-2xl w-full transition">
                <i data-lucide="map-pin" class="text-blue-300"></i>
                <span class="sidebar-text font-bold text-xs uppercase tracking-widest">İzmir</span>
            </button>
        </nav>
    </aside>

    <main class="main-content lg:ml-64 w-full p-6 lg:p-12 space-y-10">
        
        <div class="flex flex-col lg:flex-row justify-between items-center gap-6">
            <div class="glass-card px-10 py-5 flex items-center gap-8 shadow-2xl">
                <div class="text-center lg:text-left">
                    <p id="currentTime" class="text-4xl data-font text-outline leading-none">00:00</p>
                    <p id="currentDate" class="text-[10px] font-black opacity-60 uppercase tracking-widest mt-2"></p>
                </div>
            </div>
            
            <div class="relative w-full lg:w-[500px]">
                <input id="cityInput" type="text" placeholder="ŞEHİR İSMİ YAZIN..." class="w-full bg-black/30 border border-white/20 rounded-2xl px-8 py-5 outline-none text-white font-bold uppercase tracking-widest focus:border-white shadow-inner">
                <button onclick="getWeather()" class="absolute right-3 top-3 bg-white text-blue-800 px-10 py-3 rounded-xl text-xs font-black hover:bg-blue-50 transition-all shadow-xl active:scale-95">ARA</button>
            </div>
        </div>

        <div class="glass-card p-10 lg:p-16 relative overflow-hidden flex flex-col justify-between min-h-[650px]">
            <div id="bgIcon" class="absolute -right-20 -bottom-20 opacity-[0.05] scale-[5]"></div>
            
            <div class="relative z-10">
                <div class="inline-flex items-center gap-4 mb-10 bg-white/10 px-8 py-4 rounded-3xl border border-white/10">
                    <i data-lucide="locate-fixed" class="text-blue-300 w-8 h-8"></i>
                    <h1 id="cityName" class="text-5xl lg:text-7xl font-black uppercase tracking-tighter text-outline">YÜKLENİYOR...</h1>
                </div>

                <div class="flex flex-col lg:flex-row items-center justify-start gap-12 lg:gap-32 mt-6">
                    <span id="temp" class="text-[13rem] lg:text-[18rem] data-font text-outline leading-none">--°</span>
                    <div id="weatherIcon" class="scale-[4] lg:scale-[6] drop-shadow-[0_20px_50px_rgba(255,255,255,0.2)]"></div>
                </div>
                <p id="description" class="text-5xl lg:text-7xl font-light capitalize text-outline mt-12 opacity-90 italic">...</p>
            </div>

            <div class="relative z-10 mt-16 flex flex-wrap gap-12 lg:gap-24 border-t border-white/20 pt-12">
                <div class="data-block">
                    <p class="text-[11px] font-black opacity-50 mb-3 uppercase tracking-widest">Gündüz Max</p>
                    <p id="dayTemp" class="text-7xl data-font text-outline">--°</p>
                </div>
                <div class="data-block">
                    <p class="text-[11px] font-black opacity-50 mb-3 uppercase tracking-widest text-blue-300">Gece Min</p>
                    <p id="nightTemp" class="text-7xl data-font text-outline text-blue-200">--°</p>
                </div>
                <div class="data-block">
                    <p class="text-[11px] font-black opacity-50 mb-3 uppercase tracking-widest">Hava Basıncı</p>
                    <p id="pressure" class="text-6xl data-font text-outline">--</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-card p-10 flex items-center gap-8 border-b-4 border-blue-400">
                <div class="bg-blue-600/30 p-6 rounded-3xl shadow-lg"><i data-lucide="wind" class="w-12 h-12"></i></div>
                <div><p class="text-xs font-black opacity-50 uppercase tracking-widest mb-2">Rüzgar Hızı (KM/S)</p><p id="windSpeed" class="text-6xl data-font text-outline">--</p></div>
            </div>
            <div class="glass-card p-10 flex items-center gap-8 border-b-4 border-cyan-400">
                <div class="bg-cyan-600/30 p-6 rounded-3xl shadow-lg"><i data-lucide="droplets" class="w-12 h-12"></i></div>
                <div><p class="text-xs font-black opacity-50 uppercase tracking-widest mb-2">Nem Oranı (%)</p><p id="humidity" class="text-6xl data-font text-outline">--</p></div>
            </div>
            <div class="glass-card p-10 flex items-center gap-8 border-b-4 border-indigo-400">
                <div class="bg-indigo-600/30 p-6 rounded-3xl shadow-lg"><i data-lucide="umbrella" class="w-12 h-12"></i></div>
                <div><p class="text-xs font-black opacity-50 uppercase tracking-widest mb-2">Yağış İhtimali (%)</p><p id="pop" class="text-6xl data-font text-outline">--</p></div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-10 pb-20">
            <div class="glass-card p-12">
                <div class="flex items-center gap-4 mb-12">
                    <i data-lucide="calendar-days" class="text-blue-300 w-8 h-8"></i>
                    <h3 class="text-3xl font-black uppercase tracking-tighter text-outline">5 Günlük Tahmin</h3>
                </div>
                <div id="forecastContainer" class="space-y-8"></div>
            </div>
            <div class="glass-card p-5 h-[650px] overflow-hidden shadow-2xl">
                <iframe id="windyIframe" src="" frameborder="0" class="w-full h-full rounded-[2.5rem]"></iframe>
            </div>
        </div>
    </main>

<script>
    const apiKey = "6d4c1f9be7237068a9dd323532bfa14d"; 

    function updateTime() {
        const now = new Date();
        document.getElementById('currentTime').innerText = now.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('currentDate').innerText = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', weekday: 'long' });
    }
    setInterval(updateTime, 1000);

    function getLucideIcon(main) {
        const map = { 'Clear': 'sun', 'Clouds': 'cloud', 'Rain': 'cloud-rain', 'Thunderstorm': 'cloud-lightning', 'Snow': 'snowflake' };
        return map[main] || 'cloud-sun';
    }

    async function getWeather(city = 'Istanbul') {
        const target = document.getElementById('cityInput').value.trim() || city;
        try {
            const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const data = await res.json();
            if(data.cod != 200) return alert("Şehir bulunamadı!");

            document.getElementById('cityName').innerText = data.name;
            document.getElementById('temp').innerText = Math.round(data.main.temp) + "°";
            document.getElementById('description').innerText = data.weather[0].description;
            document.getElementById('windSpeed').innerText = Math.round(data.wind.speed * 3.6);
            document.getElementById('humidity').innerText = data.main.humidity;
            document.getElementById('pressure').innerText = data.main.pressure;

            const iconName = getLucideIcon(data.weather[0].main);
            document.getElementById('weatherIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;
            document.getElementById('bgIcon').innerHTML = `<i data-lucide="${iconName}" class="w-full h-full text-white"></i>`;

            document.getElementById('windyIframe').src = `https://embed.windy.com/embed2.html?lat=${data.coord.lat}&lon=${data.coord.lon}&zoom=6&overlay=rain&product=ecmwf&metricWind=km%2Fh&metricTemp=%C2%B0C`;

            const fRes = await fetch(`https://api.openweathermap.org/data/2.5/forecast?q=${target}&appid=${apiKey}&units=metric&lang=tr`);
            const fData = await fRes.json();
            document.getElementById('pop').innerText = Math.round((fData.list[0].pop || 0) * 100);

            const daily = {};
            fData.list.forEach(i => {
                const d = i.dt_txt.split(' ')[0];
                if(!daily[d]) daily[d] = { max: [], min: [], icon: i.weather[0].main };
                daily[d].max.push(i.main.temp_max);
                daily[d].min.push(i.main.temp_min);
            });

            document.getElementById('dayTemp').innerText = Math.round(Math.max(...daily[Object.keys(daily)[0]].max)) + "°";
            document.getElementById('nightTemp').innerText = Math.round(Math.min(...daily[Object.keys(daily)[0]].min)) + "°";

            const container = document.getElementById('forecastContainer');
            container.innerHTML = "";
            Object.keys(daily).slice(1, 6).forEach(d => {
                const name = new Date(d).toLocaleDateString('tr-TR', { weekday: 'long' });
                container.innerHTML += `
                    <div class="flex items-center justify-between p-8 bg-white/5 rounded-[2.5rem] border border-white/5 hover:bg-white/10 transition-all group">
                        <span class="font-black text-xl w-40 uppercase tracking-tighter">${name}</span>
                        <div class="flex items-center gap-8">
                            <i data-lucide="${getLucideIcon(daily[d].icon)}" class="text-blue-300 w-10 h-10 group-hover:scale-125 transition-transform"></i>
                            <div class="text-right">
                                <span class="data-font text-5xl text-outline">${Math.round(Math.max(...daily[d].max))}°</span>
                                <span class="text-sm font-black opacity-30 ml-3">/ ${Math.round(Math.min(...daily[d].min))}° GECE</span>
                            </div>
                        </div>
                    </div>`;
            });
            lucide.createIcons();
        } catch (e) { console.error(e); }
    }

    document.getElementById('cityInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') getWeather(); });
    window.onload = () => { getWeather(); updateTime(); };
</script>
</body>
</html>
